version: '3.8'

networks:
  app-tier:
    driver: bridge

volumes:
  opensearch_data:
    driver: local
    driver_opts:
      type: none
      device: data/opensearch/
      o: bind
  redis_insight_data:

services:
  postgres:
    image: postgres:17.0-alpine
    restart: always
    ports:
      - 15432:5432
    networks:
      - app-tier
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_USER=${POSTGRES__USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES__PASSWORD}
      - POSTGRES_DB=${POSTGRES__DB}
    volumes:
      - ./data/pg_history:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES__USERNAME} -d ${POSTGRES__DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  opensearch:
    image: opensearchproject/opensearch:latest
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - logger.level=ERROR
      - rootLogger.level=ERROR
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}

    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - 19200:9200
      - 19600:9600
    deploy:
      resources:
        reservations:
          memory: 2G
        limits:
          memory: 3G
    restart: always
    networks:
      - app-tier

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    ports:
      - 5601:5601
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    restart: always
    networks:
      - app-tier

  litellm_service:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "9510:4000"
    networks:
      - app-tier
    volumes:
      - ./config.yaml:/app/config.yaml
    command:
      - "--config=/app/config.yaml"
    environment:
      - GEMINI_API_KEY1=${GEMINI_API_KEY1}

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    networks:
      - app-tier
    volumes:
      - ./data/redis:/data
    command: redis-stack-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    networks:
      - app-tier
    volumes:
      - redis_insight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    environment:
      - RI_APP_PORT=5540

  chatwithdb_service:
    build:
      context: .
      dockerfile: devops/Dockerfile
      args:
        - PACKAGE=chatwithdb
        - OPTIONAL_BUILD=src/chatwithdb/__init__.py
    command: ["uv", "run", "--no-sync", "chatwithdb"]
    ports:
      - "3333:3333"
    networks:
      - app-tier
    volumes:
      - type: bind
        source: ./chatwithdb/
        target: /home/sunbot/app/services/chatwithdb/
      - type: bind
        source: ./libs/
        target: /home/sunbot/app/libs/
    environment:
      - LITELLM__TOKEN=${LITELLM__TOKEN}
      - LITELLM__URL=http://litellm_service:4000
      - POSTGRES__USERNAME=${POSTGRES__USERNAME}
      - POSTGRES__PASSWORD=${POSTGRES__PASSWORD}
      - POSTGRES__HOST=postgres
      - POSTGRES__DB=${POSTGRES__DB}
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - OPENSEARCH__HOST=opensearch
      - OPENSEARCH__PORT=9200
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - PORT=3333
      - HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  aqi_agent_service:
    build:
      context: .
      dockerfile: devops/Dockerfile
      args:
        - PACKAGE=aqi-agent
        - OPTIONAL_BUILD=src/aqi_agent/__init__.py
    command: ["uv", "run", "--no-sync", "aqi_agent"]
    ports:
      - "3334:3334"
    networks:
      - app-tier
    volumes:
      - type: bind
        source: ./services/aqi_agent/
        target: /home/sunbot/app/services/aqi_agent/
      - type: bind
        source: ./libs/
        target: /home/sunbot/app/libs/
    environment:
      - LITELLM__TOKEN=${LITELLM__TOKEN}
      - LITELLM__URL=http://litellm_service:4000
      - POSTGRES__USERNAME=${POSTGRES__USERNAME}
      - POSTGRES__PASSWORD=${POSTGRES__PASSWORD}
      - POSTGRES__HOST=postgres
      - POSTGRES__DB=${POSTGRES__DB}
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - OPENSEARCH__HOST=opensearch
      - OPENSEARCH__PORT=9200
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - PORT=3334
      - HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always